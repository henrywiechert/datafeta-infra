# datafeta.io — promotional website
#
# HTTP only. Run certbot to add SSL:
#   certbot --nginx -d datafeta.io -d www.datafeta.io
# Certbot will add HTTPS blocks and HTTP→HTTPS redirects automatically.

# Redirect www → apex (HTTP; certbot adds the matching HTTPS redirect)
server {
    listen 80;
    server_name www.datafeta.io;
    return 301 http://datafeta.io$request_uri;
}

server {
    listen 80;
    server_name datafeta.io;

    location / {
        proxy_pass         http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
