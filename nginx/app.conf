# app.datafeta.io — DataSlicer application
#
# HTTP only. Run certbot to add SSL:
#   certbot --nginx -d app.datafeta.io
# Certbot will automatically add the HTTPS server block.

server {
    listen 80;
    server_name app.datafeta.io;

    # Allow large request bodies for file uploads (CSV, Parquet, etc.)
    client_max_body_size 100M;

    location / {
        proxy_pass            http://127.0.0.1:8100;
        proxy_http_version    1.1;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        # Disable buffering for streaming/SSE responses
        proxy_buffering       off;
    }
}
